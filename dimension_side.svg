<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600" width="800" height="600">
  <rect width="800" height="600" fill="#14141e"/>
  
  <!-- Wall -->
  <rect x="0" y="0" width="300" height="600" fill="#1a1a24"/>
  <line x1="300" y1="0" x2="300" y2="600" stroke="#333" stroke-width="2"/>
  
  <!-- Mounting plate (recessed in wall) -->
  <rect x="280" y="60" width="40" height="480" rx="2" fill="#a0a0a0" stroke="#777" stroke-width="1"/>
  
  <!-- Housing body -->
  <rect x="320" y="50" width="380" height="500" rx="6" fill="#b3b3b3" stroke="#888" stroke-width="1"/>
  
  <!-- Internal electronics area -->
  <rect x="340" y="80" width="240" height="440" rx="3" fill="#2a2a35"/>
  
  <!-- Glass panel (front face) -->
  <rect x="680" y="70" width="50" height="460" rx="3" fill="#dcdcd7" stroke="#bbb" stroke-width="0.5"/>
  
  <!-- Depth dimension (Z) - top -->
  <line x1="320" y1="28" x2="730" y2="28" stroke="#fff" stroke-width="2"/>
  <line x1="320" y1="23" x2="320" y2="33" stroke="#fff" stroke-width="2"/>
  <line x1="730" y1="23" x2="730" y2="33" stroke="#fff" stroke-width="2"/>
  <polygon points="328,28 320,21 320,35" fill="#fff"/>
  <polygon points="722,28 730,21 730,35" fill="#fff"/>
  <text x="525" y="20" text-anchor="middle" fill="#fff" font-family="monospace" font-size="16">Projection: 32.0 mm</text>
  
  <!-- Height dimension - left -->
  <line x1="250" y1="50" x2="250" y2="550" stroke="#fff" stroke-width="2"/>
  <line x1="245" y1="50" x2="255" y2="50" stroke="#fff" stroke-width="2"/>
  <line x1="245" y1="550" x2="255" y2="550" stroke="#fff" stroke-width="2"/>
  <polygon points="250,58 243,50 257,50" fill="#fff"/>
  <polygon points="250,542 243,550 257,550" fill="#fff"/>
  <text x="238" y="306" text-anchor="middle" fill="#fff" font-family="monospace" font-size="16" transform="rotate(270,238,306)">86.0 mm</text>

  <!-- Wall thickness hint -->
  <text x="140" y="306" text-anchor="middle" fill="#555" font-family="monospace" font-size="13">Wall</text>
  <line x1="160" y1="296" x2="160" y2="316" stroke="#555" stroke-width="1"/>
  <line x1="140" y1="296" x2="140" y2="316" stroke="#555" stroke-width="1"/>
  <line x1="140" y1="306" x2="160" y2="306" stroke="#555" stroke-width="1"/>

  <!-- Title -->
  <text x="525" y="570" text-anchor="middle" fill="#666" font-family="monospace" font-size="13">SIDE VIEW (Section)</text>
</svg>
